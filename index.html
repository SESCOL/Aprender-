<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letritas Regina — Aprende a leer jugando</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #4FC3F7;
    --azul-oscuro: #0288D1;
    --amarillo: #FFD54F;
    --verde: #81C784;
    --coral: #FF8A65;
    --violeta: #CE93D8;
    --fondo: #FFFDE7;
    --blanco: #ffffff;
    --texto: #37474F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== PANTALLA PRINCIPAL ===== */
  #pantalla-inicio {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }

  .titulo-principal {
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
    line-height: 1;
    margin-bottom: 10px;
  }

  .titulo-principal span:nth-child(1) { color: var(--coral); }
  .titulo-principal span:nth-child(2) { color: var(--azul); }
  .titulo-principal span:nth-child(3) { color: var(--verde); }
  .titulo-principal span:nth-child(4) { color: var(--amarillo); }
  .titulo-principal span:nth-child(5) { color: var(--violeta); }
  .titulo-principal span:nth-child(6) { color: var(--coral); }
  .titulo-principal span:nth-child(7) { color: var(--azul); }
  .titulo-principal span:nth-child(8) { color: var(--verde); }

  .subtitulo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #78909C;
    margin-bottom: 30px;
  }

  .mascota-inicio {
    font-size: 6rem;
    margin-bottom: 30px;
    animation: flotar 2s ease-in-out infinite;
  }

  @keyframes flotar {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .estrellas-fondo {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .estrella {
    position: absolute;
    font-size: 1.5rem;
    animation: girar 8s linear infinite;
    opacity: 0.3;
  }

  @keyframes girar {
    from { transform: rotate(0deg) translateX(20px); }
    to { transform: rotate(360deg) translateX(20px); }
  }

  .grid-juegos {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 420px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .tarjeta-juego {
    background: var(--blanco);
    border-radius: 18px;
    padding: 20px 28px;
    cursor: pointer;
    border: 4px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    user-select: none;
    display: flex;
    align-items: center;
    gap: 20px;
    text-align: left;
  }

  .tarjeta-juego:hover {
    transform: translateX(6px);
    box-shadow: 0 10px 0 rgba(0,0,0,0.08);
  }

  .tarjeta-juego:active { transform: scale(0.97); }

  .tarjeta-juego[data-juego="1"] { border-color: var(--coral); }
  .tarjeta-juego[data-juego="2"] { border-color: var(--azul); }
  .tarjeta-juego[data-juego="3"] { border-color: var(--verde); }

  .icono-juego { font-size: 2.8rem; flex-shrink: 0; }
  .nombre-juego { font-size: 1.2rem; font-weight: 900; margin-bottom: 4px; }
  .desc-juego { font-size: 0.9rem; color: #90A4AE; font-weight: 700; }

  /* ===== PANTALLA DE JUEGO ===== */
  #pantalla-juego {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 20px;
  }

  .barra-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .btn-volver {
    background: var(--blanco);
    border: 3px solid #CFD8DC;
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    color: var(--texto);
    transition: background 0.2s;
  }

  .btn-volver:hover { background: #ECEFF1; }

  .puntos-display {
    background: var(--amarillo);
    border-radius: 50px;
    padding: 10px 24px;
    font-weight: 900;
    font-size: 1.1rem;
    color: #5D4037;
    box-shadow: 0 4px 0 #F9A825;
  }

  .area-juego {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .mascota-guia {
    font-size: 4rem;
    animation: flotar 2s ease-in-out infinite;
  }

  .pregunta-texto {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 900;
    text-align: center;
    color: var(--texto);
    line-height: 1.3;
  }

  /* ===== JUEGO 1: Letras y Sonidos ===== */
  .letra-grande {
    font-size: clamp(5rem, 20vw, 9rem);
    font-weight: 900;
    color: var(--coral);
    background: white;
    border-radius: 24px;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 0 rgba(255,138,101,0.3);
    border: 4px solid var(--coral);
  }

  .opciones-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 400px;
  }

  .opcion-btn {
    background: var(--blanco);
    border: 4px solid #CFD8DC;
    border-radius: 20px;
    padding: 18px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1rem, 4vw, 1.4rem);
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    color: var(--texto);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-shadow: 0 5px 0 #CFD8DC;
  }

  .opcion-btn:hover {
    transform: translateY(-3px);
    border-color: var(--azul);
  }

  .opcion-btn:active { transform: scale(0.95); }

  .opcion-btn.correcto {
    background: var(--verde);
    border-color: #4CAF50;
    color: white;
    box-shadow: 0 5px 0 #388E3C;
    animation: saltar 0.4s ease;
  }

  .opcion-btn.incorrecto {
    background: #EF9A9A;
    border-color: #E53935;
    color: white;
    animation: sacudir 0.4s ease;
  }

  @keyframes saltar {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  @keyframes sacudir {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .emoji-opcion { font-size: 2rem; }

  /* ===== JUEGO 2: Armar Palabras ===== */
  .imagen-palabra {
    font-size: 6rem;
    text-align: center;
  }

  .hueco-palabra {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hueco-letra {
    width: 56px;
    height: 64px;
    border-radius: 12px;
    border: 4px solid #B0BEC5;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 900;
    color: var(--azul-oscuro);
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 4px 0 #B0BEC5;
  }

  .hueco-letra.lleno { background: #E3F2FD; border-color: var(--azul); }
  .hueco-letra:hover.lleno { background: #FFCDD2; border-color: var(--coral); }

  .letras-disponibles {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .letra-disponible {
    width: 56px;
    height: 64px;
    border-radius: 12px;
    border: 4px solid var(--azul);
    background: var(--azul);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 900;
    color: white;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
    box-shadow: 0 5px 0 var(--azul-oscuro);
    user-select: none;
  }

  .letra-disponible:hover { transform: translateY(-4px); }
  .letra-disponible:active { transform: scale(0.9); }
  .letra-disponible.usada { opacity: 0.25; pointer-events: none; }

  .btn-verificar {
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 40px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #388E3C;
    transition: transform 0.15s;
    display: none;
  }

  .btn-verificar:hover { transform: translateY(-2px); }
  .btn-verificar:active { transform: translateY(2px); box-shadow: 0 3px 0 #388E3C; }

  /* ===== JUEGO 3: Letra Que Falta ===== */
  .palabra-con-hueco {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: clamp(2.5rem, 10vw, 5rem);
    font-weight: 900;
    letter-spacing: 4px;
  }

  .hueco-vacio {
    display: inline-block;
    width: 60px;
    height: 70px;
    border-bottom: 6px solid var(--violeta);
    color: var(--violeta);
    text-align: center;
    line-height: 70px;
    min-width: 50px;
  }

  .teclado-letras {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 380px;
  }

  .tecla {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    border: 3px solid #B0BEC5;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    color: var(--texto);
    box-shadow: 0 4px 0 #B0BEC5;
  }

  .tecla:hover { transform: translateY(-3px); background: #E3F2FD; border-color: var(--azul); }
  .tecla.correcto { background: var(--verde); color: white; border-color: #4CAF50; animation: saltar 0.4s; }
  .tecla.incorrecto { background: #EF9A9A; border-color: #E53935; animation: sacudir 0.4s; }

  /* ===== FEEDBACK ===== */
  .feedback-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .feedback-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .feedback-burbuja {
    background: white;
    border-radius: 32px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: aparecer 0.3s ease;
  }

  @keyframes aparecer {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .feedback-emoji { font-size: 5rem; margin-bottom: 10px; }
  .feedback-texto { font-size: 2rem; font-weight: 900; margin-bottom: 20px; }
  .feedback-texto.bien { color: var(--verde); }
  .feedback-texto.mal { color: var(--coral); }

  .btn-siguiente {
    background: var(--azul);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--azul-oscuro);
    transition: transform 0.15s;
  }

  .btn-siguiente:hover { transform: translateY(-2px); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: caer 1.5s ease forwards;
    pointer-events: none;
    z-index: 200;
  }

  @keyframes caer {
    0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Barra de progreso */
  .barra-progreso-wrap {
    width: 100%;
    max-width: 400px;
    background: #CFD8DC;
    border-radius: 50px;
    height: 14px;
    overflow: hidden;
  }

  .barra-progreso-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--verde), var(--azul));
    transition: width 0.4s ease;
  }

  .progreso-texto {
    font-size: 0.9rem;
    font-weight: 700;
    color: #90A4AE;
    margin-top: 4px;
  }
  .btn-musica {
    background: var(--blanco);
    border: 3px solid #CFD8DC;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-musica:hover { background: #ECEFF1; transform: scale(1.1); }
</style>
</head>
<body>

<div class="estrellas-fondo" id="estrellas"></div>

<!-- PANTALLA INICIO -->
<div id="pantalla-inicio">
  <div style="position:relative;z-index:1;">
    <div style="position:absolute;top:-10px;right:0;">
      <button class="btn-musica" id="btn-musica-inicio" onclick="toggleMusica()" title="Música">🔊</button>
    </div>
    <div class="mascota-inicio">🦉</div>
    <div class="titulo-principal">
      <span>L</span><span>e</span><span>t</span><span>r</span><span>i</span><span>t</span><span>a</span><span>s</span>
    </div>
    <div class="titulo-principal" style="font-size:clamp(2rem,7vw,4rem);margin-top:4px;">
      <span>R</span><span>e</span><span>g</span><span>i</span><span>n</span><span>a</span>
    </div>
    <p class="subtitulo">¡Aprende a leer jugando!</p>
    <div class="grid-juegos">
      <div class="tarjeta-juego" data-juego="1" onclick="iniciarJuego(1)">
        <div class="icono-juego">🔤</div>
        <div>
          <div class="nombre-juego">¿Qué letra es?</div>
          <div class="desc-juego">Une la letra con la imagen</div>
        </div>
      </div>
      <div class="tarjeta-juego" data-juego="2" onclick="iniciarJuego(2)">
        <div class="icono-juego">🧩</div>
        <div>
          <div class="nombre-juego">Arma la palabra</div>
          <div class="desc-juego">Pon las letras en orden</div>
        </div>
      </div>
      <div class="tarjeta-juego" data-juego="3" onclick="iniciarJuego(3)">
        <div class="icono-juego">🔍</div>
        <div>
          <div class="nombre-juego">Letra escondida</div>
          <div class="desc-juego">¿Qué letra falta?</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PANTALLA JUEGO -->
<div id="pantalla-juego">
  <div class="barra-top">
    <button class="btn-volver" onclick="volverInicio()">← Inicio</button>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn-musica" id="btn-musica-juego" onclick="toggleMusica()">🔊</button>
      <div class="puntos-display">⭐ <span id="puntos-num">0</span> puntos</div>
    </div>
  </div>
  <div class="barra-progreso-wrap" style="max-width:100%;margin-bottom:4px;">
    <div class="barra-progreso-fill" id="barra-prog" style="width:0%"></div>
  </div>
  <p class="progreso-texto" id="texto-progreso">Pregunta 1 de 6</p>

  <div class="area-juego" id="area-juego"></div>
</div>

<!-- FEEDBACK OVERLAY -->
<div class="feedback-overlay" id="feedback-overlay">
  <div class="feedback-burbuja">
    <div class="feedback-emoji" id="feedback-emoji"></div>
    <div class="feedback-texto" id="feedback-texto"></div>
    <div id="feedback-respuesta" style="font-size:1rem;color:#90A4AE;font-weight:700;margin-bottom:16px;"></div>

  </div>
</div>

<script>
// =====================================================
// DATOS
// =====================================================

const datos_juego1 = [
  { letra:'A', opciones:[{emoji:'🕷️',nombre:'araña',correcto:true},{emoji:'🐱',nombre:'gato',correcto:false},{emoji:'🐶',nombre:'perro',correcto:false},{emoji:'🌺',nombre:'flor',correcto:false}] },
  { letra:'B', opciones:[{emoji:'🐸',nombre:'rana',correcto:false},{emoji:'🏀',nombre:'balón',correcto:true},{emoji:'🌙',nombre:'luna',correcto:false},{emoji:'🐟',nombre:'pez',correcto:false}] },
  { letra:'C', opciones:[{emoji:'🐎',nombre:'caballo',correcto:true},{emoji:'🍇',nombre:'uvas',correcto:false},{emoji:'🐘',nombre:'elefante',correcto:false},{emoji:'🦁',nombre:'león',correcto:false}] },

  { letra:'T', opciones:[{emoji:'🐢',nombre:'tortuga',correcto:true},{emoji:'🐻',nombre:'oso',correcto:false},{emoji:'🌸',nombre:'flor',correcto:false},{emoji:'🦁',nombre:'león',correcto:false}] },

function iniciarJuego(num) {

  pregunta_actual = 0;
  puntos = 0;
  document.getElementById('puntos-num').textContent = 0;
  
  if (num === 1) {
    preguntas = mezclar([...datos_juego1]).slice(0, MAX_PREGUNTAS);
  } else if (num === 2) {
    preguntas = mezclar([...datos_juego2]).slice(0, MAX_PREGUNTAS);
  } else {
    preguntas = mezclar([...datos_juego3]).slice(0, MAX_PREGUNTAS);
  }

  document.getElementById('pantalla-inicio').style.display = 'none';
  document.getElementById('pantalla-juego').style.display = 'flex';
  mostrarPregunta();
}

function actualizarProgreso() {
  const pct = (pregunta_actual / MAX_PREGUNTAS) * 100;
  document.getElementById('barra-prog').style.width = pct + '%';
  document.getElementById('texto-progreso').textContent = 
    `Pregunta ${pregunta_actual + 1} de ${MAX_PREGUNTAS}`;
}

function mostrarPregunta() {
  actualizarProgreso();
  const area = document.getElementById('area-juego');
  area.innerHTML = '';

  if (juego_actual === 1) mostrarJuego1(area);
  else if (juego_actual === 2) mostrarJuego2(area);
  else mostrarJuego3(area);
}

function mostrarFeedback(correcto, respuesta_correcta='') {
  const overlay = document.getElementById('feedback-overlay');
  const emoji = document.getElementById('feedback-emoji');
  const texto = document.getElementById('feedback-texto');
  const resp = document.getElementById('feedback-respuesta');

  const bien_emojis = ['🎉','🌟','🥳','🎊','✨','🦸'];
  const mal_emojis  = ['😅','💪','🤔','😊'];

  if (correcto) {
    emoji.textContent = bien_emojis[Math.floor(Math.random()*bien_emojis.length)];
    texto.textContent = ['¡Muy bien!','¡Excelente!','¡Correcto!','¡Genial!'][Math.floor(Math.random()*4)];
    texto.className = 'feedback-texto bien';
    resp.textContent = '';
    lanzarConfetti();
  } else {
    emoji.textContent = mal_emojis[Math.floor(Math.random()*mal_emojis.length)];
    texto.textContent = ['¡Casi!','¡Sigue intentando!','¡Tú puedes!'][Math.floor(Math.random()*3)];
    texto.className = 'feedback-texto mal';
    resp.textContent = respuesta_correcta ? `La respuesta era: ${respuesta_correcta}` : '';
  }

  overlay.classList.add('visible');
  setTimeout(() => siguientePregunta(), correcto ? 1500 : 2500);
}

function siguientePregunta() {
  document.getElementById('feedback-overlay').classList.remove('visible');
  pregunta_actual++;
  if (pregunta_actual >= MAX_PREGUNTAS) {
    mostrarFinal();
  } else {

}

function responderJuego1(btn, correcto, respCorrectaNombre) {
  const grid = document.getElementById('ops-grid');

  if (correcto) {
    btn.classList.add('correcto');
    puntos += 10;

    setTimeout(() => mostrarFeedback(false, respCorrectaNombre), 500);
  }
}

// =====================================================
// JUEGO 2: Armar la palabra
// =====================================================
function mostrarJuego2(area) {
  const p = preguntas[pregunta_actual];

  // Crear fichas: cada letra de la palabra es un objeto con id único
  const fichas_palabra = p.palabra.split('').map((letra, i) => ({ id: i, letra }));

  // 2 letras extra distractor que no estén en la palabra
  const todas_extra = ['X','Q','Z','W','K','Y','H','V','J'];
  const letras_extra = todas_extra.filter(l => !p.palabra.includes(l)).slice(0, 2);
  const fichas_extra = letras_extra.map((letra, i) => ({ id: p.palabra.length + i, letra }));

  // Pool mezclado de fichas
  const pool = mezclar([...fichas_palabra, ...fichas_extra]);

  // Estado: array de huecos, cada uno guarda el id de ficha colocada o null
  const huecos_estado = new Array(p.palabra.length).fill(null);

  area.innerHTML = `
    <div class="mascota-guia">🦊</div>
    <p class="pregunta-texto">¿Cómo se escribe?</p>
    <div class="imagen-palabra">${p.imagen}</div>
    <div class="hueco-palabra" id="huecos"></div>
    <div class="letras-disponibles" id="letras-pool"></div>
  `;

  // Renderizar huecos
  const huecos_div = area.querySelector('#huecos');
  for (let i = 0; i < p.palabra.length; i++) {
    const h = document.createElement('div');
    h.className = 'hueco-letra';
    h.dataset.hueco = i;
    h.onclick = () => {
      if (huecos_estado[i] === null) return;
      // Devolver ficha al pool
      const fichaId = huecos_estado[i];
      huecos_estado[i] = null;
      h.textContent = '';
      h.classList.remove('lleno');
      // Reactivar la ficha en el pool
      const fichaBtn = area.querySelector(`.letra-disponible[data-fid="${fichaId}"]`);
      if (fichaBtn) fichaBtn.classList.remove('usada');
    };
    huecos_div.appendChild(h);
  }

  // Renderizar fichas del pool
  const poolDiv = area.querySelector('#letras-pool');
  pool.forEach(ficha => {
    const l = document.createElement('div');
    l.className = 'letra-disponible';
    l.textContent = ficha.letra;
    l.dataset.fid = ficha.id;
    l.onclick = () => {
      if (l.classList.contains('usada')) return;
      // Encontrar primer hueco vacío
      const huecosDivs = area.querySelectorAll('.hueco-letra');
      for (let i = 0; i < huecos_estado.length; i++) {
        if (huecos_estado[i] === null) {
          huecos_estado[i] = ficha.id;
          huecosDivs[i].textContent = ficha.letra;
          huecosDivs[i].classList.add('lleno');
          l.classList.add('usada');
          break;
        }
      }
      // Verificar automáticamente al llenar el último hueco
      if (!huecos_estado.includes(null)) {
        area.querySelectorAll('.letra-disponible').forEach(b => b.style.pointerEvents = 'none');
        area.querySelectorAll('.hueco-letra').forEach(b => b.style.pointerEvents = 'none');
        setTimeout(() => verificarJuego2(p.palabra), 300);
      }
    };
    poolDiv.appendChild(l);
  });

  // Guardar referencia al estado para verificar
  window._huecos_estado = huecos_estado;
  window._fichas_pool = pool;
}

function verificarJuego2(palabraCorrecta) {
  const estado = window._huecos_estado;
  const pool = window._fichas_pool;
  // Reconstruir la palabra desde los huecos usando las fichas
  const formada = estado.map(fichaId => {
    const ficha = pool.find(f => f.id === fichaId);
    return ficha ? ficha.letra : '';
  }).join('');
  if (formada === palabraCorrecta) {
    puntos += 10;
    document.getElementById('puntos-num').textContent = puntos;
    mostrarFeedback(true);
  } else {
    mostrarFeedback(false, palabraCorrecta);
  }
}

// JUEGO 3: Letra escondida
// =====================================================
function mostrarJuego3(area) {
  const p = preguntas[pregunta_actual];
  const letras = p.palabra.split('');
  const letraCorrecta = letras[p.hueco];
  
  // Construir visualización
  let displayHTML = '';
  letras.forEach((l, i) => {
    if (i === p.hueco) {
      displayHTML += `<span class="hueco-vacio" id="hueco-respuesta">_</span>`;
    } else {
      displayHTML += `<span>${l}</span>`;
    }
  });

  // mezclar opciones
  const ops = mezclar([...new Set([letraCorrecta, ...p.opciones])]).slice(0, 4);

  area.innerHTML = `
    <div class="mascota-guia">🐼</div>
    <div class="imagen-palabra" style="font-size:5rem;">${p.imagen}</div>
    <p class="pregunta-texto">¿Qué letra falta?</p>
    <div class="palabra-con-hueco">${displayHTML}</div>
    <div class="teclado-letras" id="teclado"></div>
  `;

  const teclado = area.querySelector('#teclado');
  ops.forEach(letra => {
    const btn = document.createElement('button');
    btn.className = 'tecla';
    btn.textContent = letra;
    btn.onclick = () => responderJuego3(btn, letra, letraCorrecta);
    teclado.appendChild(btn);
  });
}

function responderJuego3(btn, letraElegida, letraCorrecta) {
  document.querySelectorAll('.tecla').forEach(b => b.onclick = null);
  if (letraElegida === letraCorrecta) {
    btn.classList.add('correcto');
    document.getElementById('hueco-respuesta').textContent = letraCorrecta;
    document.getElementById('hueco-respuesta').style.color = 'var(--verde)';
    document.getElementById('hueco-respuesta').style.borderColor = 'var(--verde)';
    puntos += 10;
    document.getElementById('puntos-num').textContent = puntos;
    setTimeout(() => mostrarFeedback(true), 500);
  } else {
    btn.classList.add('incorrecto');
    setTimeout(() => mostrarFeedback(false, `La letra era: ${letraCorrecta}`), 500);
  }
}

function mezclar(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function lanzarConfetti() {
  const colores = ['#4FC3F7','#FFD54F','#81C784','#FF8A65','#CE93D8','#F06292'];
  for (let i=0;i<30;i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = (Math.random()*100) + 'vw';
    c.style.top = '-20px';
    c.style.background = colores[Math.floor(Math.random()*colores.length)];
    c.style.animationDelay = (Math.random()*0.8) + 's';
    c.style.animationDuration = (1+Math.random()) + 's';
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2500);
  }
}

// =====================================================
// MÚSICA DE FONDO — Web Audio API
// =====================================================
let audioCtx = null;
let musicaActiva = false;
let nodos_activos = [];
let intervalo_musica = null;

// Escala pentatónica de Do mayor (suave y relajante)
const NOTAS = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99];

function iniciarAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function tocarNota(frecuencia, tiempo_inicio, duracion, volumen = 0.08) {
  if (!audioCtx || !musicaActiva) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filtro = audioCtx.createBiquadFilter();

  // Onda sinusoidal suave
  osc.type = 'sine';
  osc.frequency.setValueAtTime(frecuencia, tiempo_inicio);

  // Filtro pasa-bajos para suavizar
  filtro.type = 'lowpass';
  filtro.frequency.setValueAtTime(1200, tiempo_inicio);

  // Envolvente ADSR suave
  gain.gain.setValueAtTime(0, tiempo_inicio);
  gain.gain.linearRampToValueAtTime(volumen, tiempo_inicio + 0.1);
  gain.gain.setValueAtTime(volumen, tiempo_inicio + duracion - 0.2);
  gain.gain.linearRampToValueAtTime(0, tiempo_inicio + duracion);

  osc.connect(filtro);
  filtro.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(tiempo_inicio);
  osc.stop(tiempo_inicio + duracion);
  nodos_activos.push(osc);
}

function tocarAcorde(tiempo_inicio) {
  if (!audioCtx || !musicaActiva) return;
  // Acorde suave de fondo (Do mayor)
  const acorde = [130.81, 164.81, 196.00]; // Do2, Mi2, Sol2
  acorde.forEach(f => tocarNota(f, tiempo_inicio, 3.5, 0.04));
}

function generarFrase() {
  if (!audioCtx || !musicaActiva) return;

  const ahora = audioCtx.currentTime;
  const patron = [0, 2, 4, 5, 4, 2, 0, 4, 2, 5, 4, 2];
  const duraciones = [0.4, 0.4, 0.4, 0.8, 0.4, 0.4, 0.8, 0.4, 0.4, 0.4, 0.8, 0.8];

  let t = ahora;
  patron.forEach((idx, i) => {
    const nota = NOTAS[idx % NOTAS.length];
    tocarNota(nota, t, duraciones[i] * 0.9, 0.07);
    t += duraciones[i];
  });

  // Acorde de fondo cada 2 frases
  tocarAcorde(ahora);
  tocarAcorde(ahora + 4);

  return t - ahora; // duración total de la frase
}

function iniciarMusica() {
  iniciarAudioCtx();
  musicaActiva = true;
  generarFrase();
  // Repetir la melodía
  intervalo_musica = setInterval(() => {
    if (musicaActiva) generarFrase();
  }, 7000);
  actualizarBotonesMusica();
}

function detenerMusica() {
  musicaActiva = false;
  clearInterval(intervalo_musica);
  nodos_activos.forEach(n => { try { n.stop(); } catch(e){} });
  nodos_activos = [];
  actualizarBotonesMusica();
}

function toggleMusica() {
  if (musicaActiva) {
    detenerMusica();
  } else {
    iniciarMusica();
  }
}

function actualizarBotonesMusica() {
  const icono = musicaActiva ? '🔊' : '🔇';
  document.querySelectorAll('.btn-musica').forEach(b => b.textContent = icono);
}

// Iniciar música automáticamente al primer clic en cualquier parte
document.addEventListener('click', function arrancarMusica() {
  if (!musicaActiva) iniciarMusica();
  document.removeEventListener('click', arrancarMusica);
}, { once: true });
